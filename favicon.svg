<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="crust" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7cd77"/>
      <stop offset="100%" stop-color="#c68a3b"/>
    </linearGradient>
    <linearGradient id="cheese" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd867"/>
      <stop offset="100%" stop-color="#f2ae2d"/>
    </linearGradient>
    <linearGradient id="sauce" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8c29"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="7" y="7" width="82" height="82" rx="18" fill="url(#tile)"/>
  <rect x="7" y="7" width="82" height="82" rx="18" fill="none" stroke="#f7b440" stroke-width="2.5" filter="url(#glow)"/>

  <circle cx="48" cy="48" r="27" fill="none" stroke="#2a2521" stroke-width="14"/>
  <circle cx="48" cy="48" r="31" fill="none" stroke="url(#crust)" stroke-width="6"/>

  <circle cx="48" cy="48" r="27" fill="none" stroke="#2b2724" stroke-width="14" stroke-dasharray="66 110" transform="rotate(-90 48 48)"/>
  <circle cx="48" cy="48" r="27" fill="none" stroke="url(#cheese)" stroke-width="14" stroke-dasharray="60 116" stroke-dashoffset="-66" transform="rotate(-90 48 48)"/>
  <circle cx="48" cy="48" r="27" fill="none" stroke="url(#sauce)" stroke-width="14" stroke-dasharray="40 136" stroke-dashoffset="-126" transform="rotate(-90 48 48)"/>

  <circle cx="66" cy="36" r="4.2" fill="#d63f1f"/>
  <circle cx="74" cy="44" r="3.8" fill="#cf3a1b"/>
  <circle cx="72" cy="57" r="3.2" fill="#c92f14"/>
  <circle cx="58" cy="67" r="4.2" fill="#cf3a1b"/>
  <circle cx="68" cy="68" r="2.5" fill="#e45623"/>
</svg>
